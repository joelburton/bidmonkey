    explain: |
      It may be only a 12-HCP hand, but never discount the value of a long suit, in this case diamonds. Thus, 12 HCP, 5 diamonds and 4 clubs = 21. Open 1♦.
    answer: 1d

#14
- hand: s- ha10876 d9875 cak75
  dealer: S
  auction:
  - s: "?"
    explain: |
      Here we see an 11-HCP hand with ♣A K and ♥A, four clubs and five hearts (11+5+4=20). Do not count distribution points for short suits — in this case, our void — until a fit is found with partner. Think about it. When was the last time you actually took a trick with a void? And what if partner insists on playing in notrump? Nonetheless, the Rule of 20 allows us to open 1♥.
    answer: 1h


