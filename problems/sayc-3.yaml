#10
- hand: saj109 hq873 daq2 cj8
  dealer: S
  auction:
  - s: "?"
    explain: |
      This is the rare distribution, 4-4-3-2, where diamonds, our longer minor, is only a three-card suit. Nonetheless, we bid it. The 1♦ opener will almost always have a four-card suit, but the 1♦ opening does not absolutely guarantee it.
    answer: 1d

