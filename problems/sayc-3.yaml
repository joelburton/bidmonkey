    answer: p

#16
- hand: sj32 hqj8 d1087 cak109
  dealer: n
  auction:
  - n: p
  - s: "?"
    explain: |
      A 1♣ opening, in spite of its lack of preemptive value, does have merit since a club lead is welcome in the event the opponents win the auction. There is another positive consideration. When you open light in third seat, you should be willing to pass any new suit bid by partner. This hand qualifies.
    answer: 1c

