quiz: BQ Fourth-Suit Forcing
problems:

#1
- hand: saq963 ha75 dk82 c95
  dealer: n
  auction:
    - n: 1d
    - e: p
    - s: 1s
    - w: p
    - n: 2c
    - e: p
    - s: "?"
      choices: [2h, 3d, 3nt]
      explain: |
        The bidding starts 1♦ - 1♠; 2♣. You want to be in game but have no idea which game will be best. It’s a perfect hand for fourth suit forcing and you bid 2♥. According to partner’s rebid and the subsequent auction, you may end up in 3NT, 4♠ or 5♦. Occasionally partner will be strong enough for a slam. Note that 3♦ would not be forcing and 3NT would simply be a guess at the best spot.
      answer: 2h

#2
- hand: s9 haq5 d973 caqj852
  dealer: n
  auction:
    - n: 1s
    - e: p
    - s: 2c
    - w: p
    - n: 2d
    - e: p
    - s: "?"
      choices: [2h, 3c, 3nt]
      explain: |
        The bidding starts 1♠ - 2♣; 2♦. A rebid of 3♣ would not be forcing. Since you have a double stopper in hearts, you are happy to bid 3NT now. Suppose you had the ♦A instead of the ♦9. With such a strong hand there would then be a good chance of a slam. You would bid a fourth suit forcing 2♥, looking for more information from your partner.
      answer: 3nt

#3
- hand: skq962 ha1087 d75 cq5
  dealer: n
  auction:
    - n: 1d
    - e: p
    - s: 1s
    - w: p
    - n: 2c
    - e: p
    - s: "?"
      choices: [2h, 2nt, 4h]
      explain: |
        The bidding starts 1♦ - 1♠; 2♣. You should not bid 2♥ now. Firstly, remember that it would not show anything in hearts. Secondly, a fourth suit forcing bid is game-forcing and you are not quite strong enough for that. You should rebid 2NT, a limit bid that invites a game and shows a stopper in the unbid suit.
      answer: 2nt

#4
- hand: s2 haj984 dkq6 caq105
  dealer: s
  auction:
    - s: 1h
    - w: p
    - n: 1s
    - e: p
    - s: 2c
    - w: p
    - n: 2d
    - e: p
    - s: "?"
      choices: [2nt, 3h, 3nt]
      explain: |
        The bidding starts 1♥ - 1♠; 2♣ - 2♦. Partner has made a fourth suit forcing bid. You are happy to bid notrump on your ♦KQ6 but should you bid 2NT or 3NT? No contest! You should bid 2NT. The bidding is forcing to game, remember, so you do not have to bid 3NT to ensure game is reached. Also, partner may have various reasons to bid 2♦. Perhaps he wants to show strong support for your hearts or clubs, or to rebid a good spade suit. Leave him the space to do this.
      answer: 2nt

#5
- hand: sq72 hak1065 d4 caq87
  dealer: s
  auction:
    - s: 1h
    - w: p
    - n: 1s
    - e: p
    - s: 2c
    - w: p
    - n: 2d
    - e: p
    - s: "?"
      choices: [2s, 2h, 3s]
      explain: |
        The bidding starts 1♥ - 1♠; 2♣ - 2♦. Although 2♠ would be forcing, this would not make it clear to your partner what useful support you have for his spades. He will nearly always hold at least five spades on this auction and a spade slam is very likely. You should jump to 3♠ to give partner the good news.
      answer: 3s

#6
- hand: s7 haq874 da10985 ca5
  dealer: s
  auction:
    - s: 1h
    - w: p
    - n: 1s
    - e: p
    - s: 2d
    - w: p
    - n: 3c
    - e: p
    - s: 3d
    - w: p
    - n: 3h
    - e: p
    - s: "?"
      choices: [4c, 4h, 4s, 4nt]
      explain: |
        The bidding starts 1♥ - 1♠; 2♦ - 3♣; 3♦ - 3♥. Partner has heart support but he did not show it on the previous round. Ask yourself: why was that? It’s because he was too strong to bid 3♥ or 4♥. He wanted to suggest a heart slam. Your hand is great for slam purposes! You hold three aces and the queen of trumps. The best bid now is actually 4♣ — a cuebid that shows the ♣A and interest in a slam. ‘How on earth am I meant to know that?’ your reaction may be. You’re right. We will discuss cuebids in the final chapter of the book. If you decided to bid 4NT instead, to ask for aces and head towards 6♥, that is equally good.
      answer: 4c
      accept: [4nt]

#7
- hand: sq65 hkq982 d97 ca63
  dealer: n
  auction:
    - n: 1d
    - e: p
    - s: 1h
    - w: p
    - n: 1s
    - e: p
    - s: "?"
      choices: [2c, 2h, 2nt, 3h]
      explain: |
        Partner opens 1♦, you respond 1♥ and he bids 1♠. This type of hand is awkward to bid. You have the values for a game try, and you would like to show partner your fifth heart. Should you make a fourth suit forcing bid of 2♣? No! That would be game-forcing. Your two value bids are 2NT (showing your club stopper) and 3♥ — but the latter would imply a decent six-card suit, which you do not have.
      answer: 2nt

#8
- hand: skj953 haj873 daj c4
  dealer: s
  auction:
    - s: 1s
    - w: p
    - n: 2c
    - e: p
    - s: 2h
    - w: p
    - n: 3d
    - e: p
    - s: "?"
      choices: [3h, 3nt, 4h]
      explain: |
        The bidding starts 1♠ - 2♣; 2♥ - 3♦. Partner’s fourth suit forcing bid asks you to describe your hand further. You have a fifth card in hearts, also a diamond stopper, and must choose between 3♥ and 3NT. It is better to rebid the hearts, ensuring that you do not miss a 5-3 fit in that suit.
      answer: 3h

#9
- hand: s102 hkq76 daq972 cq4
  dealer: n
  auction:
    - n: 1s
    - e: p
    - s: 2d
    - w: p
    - n: 2h
    - e: p
    - s: "?"
      choices: [3c, 3h, 4h]
      explain: |
        The bidding starts 1♠ - 2♦; 2♥. There is no need to bid a fourth suit forcing 3♣ on this hand. A straightforward raise to 4♥ will describe your hand admirably.
      answer: 4h

