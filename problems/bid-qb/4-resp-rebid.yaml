quiz: BQ Responder's Rebid
problems:

#1
- hand: sa94 hkq76 dj82 c1053
  dealer: n
  auction:
    - n: 1d
    - e: p
    - s: 1h
    - w: p
    - n: 1nt
    - e: p
    - s: "?"
      choices: [p, 2d, 2nt]
      explain: |
        The bidding starts 1♦ - 1♥; 1NT. With only 10 points opposite 12-14, you are not strong enough to try for game. (With two balanced hands, you need a combined 25 points for 3NT.) You should pass.
      answer: p

#2
- hand: sk8763 hj105 dq3 cj98
  dealer: n
  auction:
    - n: 1d
    - e: p
    - s: 1s
    - w: p
    - n: 2nt
    - e: p
    - s: "?"
      choices: [p, 3s, 3nt]
      explain: |
        The bidding starts 1♦ - 1♠; 2NT. Partner has shown a balanced hand containing 18-19 points. Add your 7 points and you have enough for game. You should raise to 3NT. There is not much point in bidding the spades again, just in case you have a 5-3 fit there. If partner holds three spades, you should be able to make four or five spade tricks in 3NT.
      answer: 3nt

#3
- hand: s74 hj982 dk3 caq1052
  dealer: n
  auction:
    - n: 1s
    - e: p
    - s: 2c
    - w: p
    - n: 2nt
    - e: p
    - s: "?"
      choices: [p, 3h, 3nt]
      explain: |
        The bidding starts 1♠ - 2♣; 2NT. Partner has shown 12-14 points, so you cannot raise to game on just 10 points. You might have only 22 points between you! You should pass. Suppose you held ♥K982 instead. The combined point-count would then be 24-26 and you would raise to 3NT.
      answer: p

#4
- hand: sak10872 hk108 d106 c54
  dealer: n
  auction:
    - n: 1c
    - e: p
    - s: 1s
    - w: p
    - n: 2c
    - e: p
    - s: "?"
      choices: [2s, 3s, 4s]
      explain: |
        After a start of 1♣ - 1♠; 2♣, you must consider your next move. You are too strong for 2♠, which would be a sign-off. With about 11 points and a good six-card suit, your hand is just right for 3♠. Going all the way to game would be a stretch, particularly as partner might hold only one spade or none at all.
      answer: 3s

#5
- hand: s82 haq6 dj84 ck10753
  dealer: n
  auction:
    - n: 1c
    - e: p
    - s: 3c
    - w: p
    - n: 3d
    - e: p
    - s: "?"
      choices: [3h, 3nt, 4c, 5c]
      explain: |
        After a start of 1♣ - 3♣ your partner rebids 3♦. What does this mean? You have already found a club fit, so he cannot be suggesting diamonds as trumps. He is showing you a diamond stopper (perhaps ♦AK7) in the hope that a final contract of 3NT may be possible. Since he did not bid 3NT himself, he probably has no stopper in one of the major suits and is hoping that you can help. You should rebid 3♥ to announce that you have a heart stopper. He may then be happy to bid 3NT. You can see how much better this sort of bidding is than simply bidding 3NT in the hope that every suit is stopped.
      answer: 3h

