quiz: BQ Overcalls and Responses
problems:

#1
- hand: saj65 hq54 daqj43 c4
  dealer: e
  auction:
    - e: 1h
    - s: "?"
      choices: [p, x, 1s, 2d]
      explain: |
        Your RHO opens 1♥. You cannot overcall 1♠ on a four-card suit, and your shape is wrong for a double (no support for clubs). So that leaves either passing or overcalling 2♦. With opening values and a decent diamond suit, 2♦ describes your hand well.
      answer: 2d

#2
- hand: sk10762 h95 d1082 cj96
  dealer: w
  auction:
    - w: 1d
    - n: 1s
    - e: 2c
    - s: "?"
      choices: [p, 2s, 3s, 4s]
      explain: |
        The auction starts: (1♦) - 1♠ - (2♣). With five-card support, you would sometimes go all the way to 4♠. Here you have no side singleton or void and are not worth going that high at any vulnerability. You should bid 3♠, showing a weak hand with good trump support. (With a stronger raise, start with 2♦.)
      answer: 3s

#3
- hand: skj982 h107 daq63 c75
  dealer: w
  auction:
    - w: 1h
    - n: 1nt
    - e: p
    - s: "?"
      choices: [2h, 3s, 3nt, 4s]
      explain: |
        LHO opens 1♥ and your partner overcalls 1NT. With 10 HCP opposite 15-18, you are worth a game contract. Which game will be better, 3NT or 4♠? You can find out by starting with a transfer response of 2♥, showing at least five spades. Over partner’s expected 2♠ you will jump to 3NT. Partner can then choose between the two possible games.
      answer: 2h

#4
- hand: saq5 hk1054 d95 ckj86
  dealer: w
  auction:
    - w: 1s
    - n: 3d
    - e: p
    - s: "?"
      choices: [p, 3s, 3nt]
      explain: |
        With neither side vulnerable LHO opens 1♠ and your partner overcalls 3♦, the next player passing. This is a weak jump overcall, remember, and you should pass. Your partner might hold ♦KQJ10732 and little else! In 3NT, the defenders would kill the dummy by holding up the ♦A and you might go four or five down. Suppose instead that partner had overcalled 2♦. Then a game is very possible and you would respond 2NT. Your chances would be better if you held three low diamonds instead of two.
      answer: p

#5
- hand: sak104 hq87 dj963 cj3
  dealer: w
  auction:
    - w: 1d
    - n: 1h
    - e: p
    - s: "?"
      choices: [1nt, 2d, 2h, 3h]
      explain: |
        Your LHO opens 1♦ and partner overcalls 1♥, next player passing. You are going to show your heart support. Since you have 11 HCP, you begin with 2♦ — a bid in the opponent’s suit. This shows at least a sound raise to the two-level (10+). If you were stronger, you could bid 2♦ and then make a further try if partner signed off in 2♥.
      answer: 2d

#6
- hand: sa109754 hq52 dak c86
  dealer: e
  auction:
    - e: 1c
    - s: 1s
    - w: p
    - n: 2h
    - e: p
    - s: "?"
      choices: [p, 2s, 3h, 4h]
      explain: |
        Partner’s 2♥ is constructive and forcing. You would have to find a second bid even on a minimum overcall with no heart fit. Here you have a respectable hand and a fit for partner’s hearts! Give partner the good news with a raise all the way to 4♥. Remember you would have to raise to 3♥ if your diamonds were only ♦K4.
      answer: 4h

#7
- hand: sq105 ha94 dk1053 cj64
  dealer: e
  auction:
    - e: 1h
    - s: p
    - w: p
    - n: 1s
    - e: p
    - s: "?"
      choices: [p, 1nt, 2h, 2s]
      explain: |
        Facing a second-seat overcall of 1♠, you would bid 2♥ to show a sound raise to the two-level. When your partner bids in the passout seat, he may well be quite weak. He knows that you hold some points (from his RHO’s pass) and he may already be assuming that you have something close to 10 points. In case he does have a good hand (also to shut out your LHO) you should raise to 2♠. You are not quite worth a strength-showing 2♥ instead.
      answer: 2s

#8
- hand: s62 hk85 dqj93 caj104
  dealer: w
  auction:
    - w: 1c
    - n: 1s
    - e: p
    - s: "?"
      choices: [p, 1nt, 2c, 2nt]
      explain: |
        The bidding starts 1♣ - 1♠ (by partner) - Pass. Although you hold 11 points, you cannot bid 2♣ because this should show at least three-card support for partner’s spades. You are very suitable for a response in notrump. If partner held the values for an opening bid, on some different sequence, you might bid 2NT to suggest a game. Here he has only overcalled at the one-level and may hold no more than 8 or 9 points. Respond just 1NT, suggesting around 8-11 HCP. With 12-14 HCP, you would go to 2NT.
      answer: 1nt

#9
- hand: sak9762 h103 dk5 ca94
  dealer: e
  auction:
    - e: 1d
    - s: 1s
    - w: p
    - n: 2d
    - e: p
    - s: "?"
      choices: [2s, 2nt, 3s, 4s]
      explain: |
        The bidding starts 1♦ - 1♠ (by you) - Pass - 2♦. The next player passes and you must calculate your rebid. Partner has shown (at least) a sound raise to 2♠. You have six excellent trumps and two good cards outside. You should bid 4♠ now. A jump to 3♠ would not be forcing and you might miss an excellent game.
      answer: 4s

#10
- hand: skq63 h97 daj4 ck1095
  dealer: w
  auction:
    - w: 1d
    - n: p
    - e: p
    - s: "?"
      choices: [p, x, 1s, 1nt]
      explain: |
        The bidding starts 1♦ - Pass - Pass. You cannot double because you have no support for hearts. Nor is an overcall of 1♠ a good bid, when you have only four cards in the suit. Your hand would be too weak for a 1NT overcall in second seat (you would have to pass, in fact). In the fourth seat, the balancing or passout seat, a 1NT overcall shows around 12-14 points. This is the action you should take.
      answer: 1nt

