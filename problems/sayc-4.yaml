#11
- hand: sa753 hk85 dk1076 c43
  dealer: n
  auction:
  - n: "1h"
  - s: "?"
    explain: |
      With three- or four-card support for partner’s major and 10-12 points, your response is a limit raise of 3♥. If partner had opened 1♠, your bid would be 3♠. In support of hearts, this hand contains 11 points, including one for the doubleton club. In support of spades, many would consider it a 12-point hand, including one additional point for the fourth spade.
    answer: 3h


#12
- hand: sj984 h76 dakq9 ck84
  dealer: n
  auction:
  - n: "1h"
  - s: "?"
    explain: |
      Partner has opened 1♥. Although you have a wonderful collection, your bid is only 1♠. When an unpassed responder bids a new suit, even if only at the one-level, it is forcing for one round, and the hand may contain anywhere from 6 to perhaps 20 or more playing points. Therefore, this seemingly mild response does not limit your strength. There is no need to rush to show your opening count, since partner must bid again. When he does, you are likely to know a great deal more about your combined assets.
    answer: 1s


