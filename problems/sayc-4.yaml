#3
- hand: sa954 hkj5 d652 c1064
  dealer: n
  auction:
  - n: "1h"
  - s: "?"
    explain: |
      With three- or four-card support for partner’s major and a weak hand, responder’s first obligation is to show support. A fit has been found and there is no reason to search elsewhere. Do not bid 1♠. You have a nice, simple call of 2♥. You will have set the trump suit and limited your hand to a maximum of 10 points in support of hearts. Had your partner opened 1♠, your bid would be 2♠.
    answer: 2h

