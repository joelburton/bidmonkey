    explain: |
      You cannot support hearts, nor do you hold four spades, and you are not strong enough to bid your clubs at the two-level. Limit your hand with a bid of 1NT. Note that the response of 1NT does not guarantee either a balanced hand or stoppers in the unbid suits.
    answer: 1nt

