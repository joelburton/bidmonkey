    explain: |
      Your partner opens 1♥. You cannot support partner, but you have a nice five-card diamond suit and sufficient count to bid it freely at the two-level. Bid 2♦. A new suit at the two-level shows at least five cards and an absolute minimum of 10 points (or four cards and 11+ points). This bid too is unlimited and forcing for one round.
    answer: 2d


