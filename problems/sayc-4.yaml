- hand: sa976 h106 dk73 c9532
  dealer: n
  auction:
  - n: "1h"
  - s: "?"
    explain: |
      You cannot support partner’s heart suit, but you do have a four-card spade suit that you can show at the one-level. Bid 1♠. Do not ‘show your count’ by bidding 1NT. You have a biddable suit and partner may hold four spades. Also, if anyone should be playing notrump, it is your partner. He has the stronger hand.
    answer: 1s

