#18
- hand: sa75 hkq1083 dk7 cj32
  dealer: s
  auction:
  - s: 1h
  - n: 2nt*
  - s: "?"
    explain: |
      Holding a balanced minimum — which means no distributional features — bid 4♥*. This is a good example of The Principle of Fast Arrival in action. By jumping to game and not making any use of the lower levels of bidding that were available, you deny any interest in slam. Remember, partner’s bid of 2NT* was game forcing.
    answer: 4h*


