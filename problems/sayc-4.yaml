#14
- hand: skj7 hkj5 dkj653 c42
  dealer: n
  auction:
  - n: "1h"
  - s: "?"
    explain: |
      When partner opens 1♥, you know your side belongs in game, at least. Do not jump to 4♥. Partner will think you have a weak, distributional holding similar to that shown in Hand 2. With a better than average hand, he will pass and slam will be missed. And don’t you just hate it when that happens? Start with a forcing bid of 2♦ and jump in hearts at your next call.
    answer: 2d


#15
- hand: sa1042 hk108 da75 cqj5
  dealer: n
  auction:
  - n: "1s"
  - s: "?"
    explain: |
      Partner opens 1♠ and we have the appropriate hand for the conventional response of 2NT*. This call is known as the Jacoby 2NT and is employed in response to a major-suit opening, with no intervening bids by the opponents. Jacoby 2NT shows an opening hand or better, and four-plus cards in support of partner’s major.
    answer: 2nt


