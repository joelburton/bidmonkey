- hand: sa753 hk8 dk765 c432
  dealer: n
  auction:
  - n: "1h"
  - s: "?"
    explain: |
      You cannot support partner’s suit, but you have a very easy response of 1♠. Note that a simple one-level response in a new suit can be made with more than a minimum hand. In fact, new suits by an unpassed responder are essentially unlimited and are 100% forcing for one round.
    answer: 1s

