#15
- hand: s65 hj32 dq106532 cj9
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      Jacoby Transfers are used only when responding to notrump and holding at least five or more cards in a major suit. A 2♦* bid transfers the opener to 2♥ and a 2♥* bid transfers the opener to 2♠. Obviously, we have just given up any chance of reaching a natural contract of 2♦ — just as we gave up the 2♣ contract when we adopted Stayman. Thus, we can no longer sign off in 2♦ — partner would take this bid as a transfer to 2♥. Instead, we must pass, or get the partnership to 3♦. We will show you how to do this a bit later in this chapter.
    answer: p
    accept: [2s]

