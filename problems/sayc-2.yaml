#20
- hand: sq10765 hkj832 d32 ca
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      This time you will transfer to the higher-ranking suit, spades.
    answer: 2h
  - n: 2s
  - s: "?"
    explain: |
      This time you will transfer to the higher-ranking suit, spades, then rebid in hearts. If you have no interest in slam, rebid 4♥. Partner either passes or corrects to 4♠. With slam interest, bid 3♥. This is forcing. Partner can now show strong support for spades with a 3♠ preference — allowing room for control-bidding below game — or show support for hearts. Note the difference between this auction and the 5-5 invitational auction presented earlier. The game-forcing auction returns the bidding to opener at the three-level. The invitational auction returns the bidding to opener at the two-level.
    answer: 3h


#21
- hand: sj76 hkj9832 da2 c97
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      Transfer to hearts.
    answer: 2d*
  - n: 2H
  - s: "?"
    explain: |
      You have no interest in any contract other than the heart game. Bid 2♦* then raise to 4♥. While not strictly part of SAYC, you will find many players who like to use Texas transfers with this kind of hand: 1NT-4♦* transfers to hearts, and 1NT-4♥* transfers to spades. After Texas, a 4NT rebid is ace-asking (i.e. 1NT-4♦*, 4♥-4NT). Contrast this sequence with 1NT-2♦*, 2♥*-4NT which is quantitative, inviting to slam in either hearts (showing a 5-card suit) or notrump. If you use Texas transfers, you can also play 1NT-2♦*, 2♥-4♥ as a mild slam try.
    answer: 4h
    accept: [4d*]

