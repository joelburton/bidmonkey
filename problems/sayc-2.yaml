#17
- hand: sqj765 hkj832 d32 c9
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      All hands containing 5-5 or better in the majors employ transfers. Most SAYC notes in this regard are either inconsistent or unclear. With invitational values, the best of several options seems to be that responder transfer to 2♥ and then bid 2♠. In the event that partner likes spades, he can pass, invite or raise to game. Preferring hearts, he can correct to 3♥ or bid the heart game.
    answer: 2d*


