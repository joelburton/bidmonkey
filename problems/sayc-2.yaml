# 12
- hand: sq65 hq108432 d10 cj83
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      In the old days, when partner opened 1NT in a Standard American auction, responder signed off in 2♥ and became the declarer. Playing Jacoby Transfers, responder instead bids 2♦*. This is a conventional bid that says absolutely nothing about diamonds. Instead, it shows the suit directly above — hearts. Opener will almost always bid 2♥ — see p. 12 for the exception — and responder will pass. The identical contract has been reached, but opener has become the declarer.
    answer: 2d

