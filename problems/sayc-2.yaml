# 12
- hand: sq65 hq108432 d10 cj83
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      In the old days, when partner opened 1NT in a Standard American auction, responder signed off in 2♥ and became the declarer. Playing Jacoby Transfers, responder instead bids 2♦*. This is a conventional bid that says absolutely nothing about diamonds. Instead, it shows the suit directly above — hearts. Opener will almost always bid 2♥ — see p. 12 for the exception — and responder will pass. The identical contract has been reached, but opener has become the declarer.
    answer: 2d

# 13
- hand: skq765 h10843 d7 c983
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      It would be nice if you could find out if partner holds four hearts and still stop at the two-level. Unfortunately, with a weak 5-4 you cannot afford to go through Stayman. Instead, bid 2♥*, transferring partner to the five-card major, and pass.
    answer: 2h

# 14
- hand: s97652 hk10843 d8 c83
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      You wish you knew which major suit partner is long in, but you don’t have time to find out. Transfer to your better major, hearts, and then pass.
    answer: 2d

#15
- hand: s65 hj32 dq106532 cj9
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      Jacoby Transfers are used only when responding to notrump and holding at least five or more cards in a major suit. A 2♦* bid transfers the opener to 2♥ and a 2♥* bid transfers the opener to 2♠. Obviously, we have just given up any chance of reaching a natural contract of 2♦ — just as we gave up the 2♣ contract when we adopted Stayman. Thus, we can no longer sign off in 2♦ — partner would take this bid as a transfer to 2♥. Instead, we must pass, or get the partnership to 3♦. We will show you how to do this a bit later in this chapter.
    answer: p
    accept: [2s]






