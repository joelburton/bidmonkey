source: Std Bidding with SAYC [sayc]
quiz: Responding to 1NT [sayc-nt-r]
titles: "SAYC Responding to 1NT #"
problems:

- hand: skj10742 hj98 d9 ck74
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      While you have only 8 HCP, you know you will be playing in spades and a holding like this is much too powerful to be treated as invitational. Get your partnership to game.
    answer: 2H

- hand: sq93 hk65 dj843 cq87
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      Your shape is flat and your points are scattered. In the long run, in spite of your 8 HCP, you do best to pass.
    answer: P

- hand: sq732 hk65 daj72 c109
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      If partner rebids 2♦, bid 3NT. If he rebids 2♠, raise to 4♠. If he rebids 2♥, bid 3NT. Since you guarantee at least one four-card major, he will know that it must be spades. If he also holds four spades, he will remove 3NT to 4♠.
    answer: 2c

- hand: sqj32 hj652 daj7 c102
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      If partner rebids 2♦, bid 2NT. If he rebids 2♠, raise to 3♠. If he rebids 2♥, raise to 3♥. Take note that whenever responder makes an invitational bid, captaincy changes. In each of the indicated auctions, responder — who will normally hold at least 8 HCP — limits his holding to 8-9 HCP and turns the decision-making process over to opener. Such is the nature of bridge — just as the value of our hands change throughout an auction, so too does captaincy change.
    answer: 2c

- hand: sk65 hq732 daj72 c109
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      If partner rebids 2♦, bid 3NT. If he rebids 2♥, bid 4♥. If he rebids 2♠, bid 3NT.
    answer: 2c

- hand: sq10732 hk652 daj c109
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      If partner rebids 2♦, bid 3♠. The jump forces partner to game and shows five spades and four hearts. With three-card spade support partner will raise to 4♠. Without it, partner will bid 3NT. If partner rebids 2♥, forget the spade suit and raise to 4♥. If partner rebids 2♠, nirvana has been achieved and you certainly don’t need us to tell you what to do now.
    answer: 2c

- hand: sj1073 hqj652 da c832
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      If opener rebids 2♦, bid 2♥. Opener now has five choices:
      - With a minimum 1NT and three hearts, he will pass.
      - With a minimum and two hearts, he will bid 2NT.
      - With an invitational 1NT hand — a good 15 to 16 and three hearts — he will bid 3♥. Given the distributional nature of this holding, if opener responds with a 3♥ bid, you are well advised to upgrade your hand and bid game.
      - With a maximum 1NT opener and three hearts, he will bid 4♥.
      - With a maximum 1NT and two hearts he will bid 3NT.
    answer: 2c

- hand: sk1073 hqj652 da7 c82
  dealer: N
  auction:
  - n: 1nt
  - s: "?"
    explain: |
      Similar to Hand 6. If partner rebids 2♦, bid 3♥. The jump forces partner to game and shows five hearts and four spades. With three-card heart support partner will raise to 4♥. Without it, partner will bid 3NT.
    answer: 2c

