#1
- hand: sa987 h9765 daj ckq8
  dealer: s
  auction:
  - s: 1c
  - n: 1h
  - s: "?"
    explain: |
      Your side has located an eight-card major suit fit. Do not bother to show your spade suit. Show the fit and the minimum with a simple raise to 2♥.
    answer: 2h

#2
- hand: sa987 h976 daj ckq87
  dealer: s
  auction:
  - s: 1c
  - n: 1h
  - s: "?"
    explain: |
      Since responder will show four-card majors up the line, partner could still own a four-card spade suit. If you fail to mention spades now, the suit will almost certainly be lost forever. Bid 1♠.
    answer: 1s

#3
- hand: sa98 h976 daj ckq875
  dealer: s
  auction:
  - s: 1c
  - n: 1h
  - s: "?"
    explain: |
      Rebid 1NT, a good description of your balanced minimum. As is true with an opening bid in notrump, the 1NT rebid does not guarantee stoppers in all of the unbid suits. Do not rebid your clubs, in spite of the fact that you never guaranteed more than three. A club rebid implies a more distributional hand and should include a six-card club suit. A raise to 2♠ is not recommended on this holding. Partner has promised no more than four cards in the suit. While not mandatory, four-card support is highly desirable.
    answer: 1nt

