#12
- hand: sa987 h9 daj104 ckq87
  dealer: s
  auction:
  - s: 1d
  - n: 1s
  - s: "?"
    explain: |
      This hand has just improved a ton from the original 14 HCP. With ruffing values, the singleton heart can be upgraded from a value of zero to the equivalent of second-round control, a king. We now give it three support points and the hand revalues to 17. Instead of 2♠, you should now invite partner to game with a raise to 3♠.
    answer: 3s

#13
- hand: saq1098 h74 d3 ckqj87
  dealer: s
  auction:
  - s: 1s
  - n: 2h
  - s: "?"
    explain: |
      You open 1♠ and partner responds 2♥, showing at least 10 HCP and five-plus hearts. You are not strong enough to rebid 3♣. In this situation, a new suit at the three-level would be forcing to game. In spite of the fact that it is normally wrong to rebid five-card suits, this situation provides one of the rare exceptions. You have no choice but to bid 2♠.
    answer: 2s

