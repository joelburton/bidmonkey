#6
- hand: sak754 hq63 dak1042 c-
  dealer: s
  auction:
  - s: 1s
  - n: 2s
  - s: "?"
    explain: |
      Two five-card suits, a void, first- and second-round control all over the place — a possible slam-try hand, not just "game-going." The cleanest, most descriptive rebid is a splinter to 4♣, showing club shortness with spade agreement and slam interest, letting partner evaluate their hand accordingly (e.g., wasted club honors become worthless, while diamond/heart controls become gold).
    answer: 4c

#7
- hand: skq542 hk64 daj6 ck3
  dealer: s
  auction:
  - s: 1s
  - n: 2s
  - s: "?"
    explain: |
      2NT — natural, invitational, balanced. You're not showing a second suit or extra trump length, you're showing extra balanced strength and letting partner pick between 3NT and 4♠ (or decline into a partscore) based on their hand.
      (Many people would have opened this with 1NT).
    answer: 2nt


