  dealer: s
  auction:
  - s: 1s
  - n: 3s
  - s: "?"
    explain: |
      Bid 4♠. It may look scary, but unbalanced holdings have an amazing way of producing extra tricks. We have followed this guideline with some very ugly minimums with surprising — and gratifying — results.
    answer: 4s

