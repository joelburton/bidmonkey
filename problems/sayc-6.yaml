#18
- hand: sa9876 hk87 daj10 ckq
  dealer: s
  auction:
  - s: 1s
  - n: 2h
  - s: "?"
    explain: |
      You decide your hand is too good to open 1NT and instead you open 1♠. Partner responds 2♥. Partner’s bid is not yet limited. All we know is that it shows a decent 10+ HCP and five or more hearts. You now raise to game with three-card support and game-going values. Your 4♥ bid need not terminate the auction. It simply says that you are willing to play game opposite any minimum hand he might have for his original call. If partner has more, we are sure you will be the first to know.
    answer: 4h

