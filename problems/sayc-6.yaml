#22
- hand: saq982 hk105 dq86 cq6
  dealer: s
  auction:
  - s: 1s
  - n: 3s
  - s: "?"
    explain: |
      To bid or not to bid? We offer the following as a guideline. Look at your hand and answer two simple questions: a) is my hand balanced? b) is my hand a minimum? By definition, in a five-card major system, a balanced hand will have 5332 distribution. We define a minimum in this context as anywhere from 12 to a bad 14 points. If the answer to both questions is yes, then pass. If not, bid game.
    answer: pass


#23
