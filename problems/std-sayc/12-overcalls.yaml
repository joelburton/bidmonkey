  #8
  - hand: s9 haq1095 d8 ckq8765
    dealer: e
    auction:
      - e: 1s
      - s: "?"
        explain: |
          If RHO opens 1♠, your highly distributional holding offsets the lack of HCP. Such hands typically have greater trick-taking potential. Also, if you bid one suit and an opponent doubles, you can then bid the other. We agree that it would be unfortunate if partner did not have tolerance for one of your suits. The small risk is worth the benefits that accrue the rest of the time. Bid 2♥ and mention the clubs at your next turn if the auction permits.
        answer: 2h

  #9
  - hand: sj5 hk1087 dq843 cj63
    dealer: w
    auction:
      - w: 1c
      - n: 1h
      - s: "?"
        explain: |
          Bid 3♥. A jump in this sequence should have less to do with HCP and more to do with your lovely four-card trump support. With one fewer heart you would simply make a competitive and natural raise to 2♥.
        answer: 3h

  #10
  - hand: skq5 ha1087 dq843 c63
    dealer: w
    auction:
      - w: 1c
      - n: 1h
      - s: "?"
        explain: |
          If the jump raise of an overcall is preemptive, with this collection you will respond to the overcall with a cuebid of 2♣. Partner will either rebid the agreed-upon suit at the lowest level — with a minimum — or jump to game if he has the appropriate values. The side benefit of this treatment should not be overlooked. Following a 1♣ opening and a 1♥ overcall by partner, in traditional auctions you would raise to 3♥. If partner has overcalled on minimum HCP, you might well be overextended. Instead, when you now bid 2♣, partner can sign off in 2♥, saving a level.
        answer: 2c

  #11
  - hand: skq5 hkj75 dq876 ck7
    dealer: w
    auction:
      - w: 1c
      - n: 1h
      - s: "?"
        explain: |
          Again, start with 2♣. If partner tries to sign off in 2♥ you will now raise to the three-level, showing your extra values.
        answer: 2c

