  #4
  - hand: sakq10985432 h2 da4 c-
    dealer: s
    auction:
      - s: "?"
        explain: |
          Most players we know would open 2♣, though there seems to be at least a touch of controversy involved. The hand does not contain 22+ HCP, but it can take eleven tricks with no help from partner. (Those players who employ the 2♣ bid to show this kind of hand only require a reasonable expectation of taking nine tricks — more tricks, incidentally, than any of the preceding three hands in the set are likely to provide.) The controversy arose from an online tournament ruling in 2000 where the director adjusted the scores of all pairs who chose to open a similar collection with a strong 2♣. Perhaps by the time this book finds its way into print, agreement here will be universal.
        answer: 2C

