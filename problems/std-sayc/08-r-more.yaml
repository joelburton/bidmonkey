- hand: sj10943 hk9 d9732 ck9
  dealer: n
  auction:
    - n: 1h
    - s: 1s
    - n: 2c
    - s: "?"
      explain: |
        Bid 2♥, returning to partner’s first suit to show heart preference and 6-9 points. Do not pass. Partner has at least five hearts, but may have only four clubs. Do not bid 2♦, which would be forcing. Do not bid 2NT. Weak hands should be played in a suit contract whenever possible. Finally, do not bid 2♠. We know you didn’t guarantee a five-card suit with your first bid, but partner might not have any spades at all. “Get out of Dodge” while you can.
      answer: 2h

