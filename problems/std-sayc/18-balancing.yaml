#14
  - hand: sq865 hkq65 dqj96 c4
    dealer: w
    auction:
      - w: 1h
      - e: p
      - s: "?"
        explain: |
          LHO opens 1♥, passed to you. Pass! If partner couldn’t take any action over 1♥, it’s hard to conceive of a good contract for your side. The most likely scenario is that opener has a very nice hand. Reopening here runs the risk of your opponents finding a better spot, or your side getting into trouble. Defend. It might be fun.
        answer: p

