  #6
  - hand: skj10865 hkq65 da3 c4
    dealer: n
    auction:
      - n: 1c
      - e: 1s
      - s: "?"
        explain: |
          Partner opens 1♣ and RHO overcalls 1♠. Pass. You cannot double for penalty, since the double would be negative. It is unlikely that LHO will have a call, so 1♠ will be passed to partner, who should strain to reopen the auction with a double. When he does, you can quietly pass. Laughing hysterically at this point would be bad form.
        answer: p

