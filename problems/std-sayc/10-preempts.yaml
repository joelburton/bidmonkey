  #14
  - hand: s9 h62 d10987 cakq985
    dealer: s
    vuln: none
    auction:
      - s: "?"
        explain: |
          An exception to the normal guidelines. You can’t bid a weak 2♣ since the 2♣ opening is reserved for all strong hands. If not vulnerable, open 3♣ in any position except fourth. You have excellent suit texture and no outside defense. When preempting in a minor suit, especially in clubs, a good six-card suit is acceptable.
        answer: 3c

