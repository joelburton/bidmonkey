  #2b
  - hand: sak1095 h53 dj108 cq98
    dealer: n
    auction:
      - n: p
      - e: p
      - s: "?"
        explain: |
          In third seat, however, you have choices. It may well be that your fourth-seat opponent is blessed with the vast majority of HCP. If so, a sensible bid by you will put pressure on your opponents to find their right spot. With this holding you may do well to bid 2♠. Yes, you have 10 HCP and might bid 1♠, but 2♠ will be more difficult for your opponents to deal with. You may also find a good sacrifice against their heart partial or game, or push them too high. Finally, since partner could not open, your own chances at a game are slim.
        answer: 2s
        accept: [1s]

  #3a
  - hand: saqj874 hq8 dk9 cq83
    dealer: s
    auction:
      - s: "?"
        explain: |
          In first, second or third seat you will open 1♠.
        answer: 1s

  #3a
  - hand: saqj874 hq8 dk9 cq83
    dealer: w
    auction:
      - w: p
      - n: p
      - e: p
      - s: "?"
        explain: |
          In fourth seat, however, you might open 2♠. Since there is no point in preempting in fourth seat, this bid is reserved for minimum range six-card openers, typically 12-14 HCP. Since many players simply bid out the hand ‘normally’ by opening 1♠ and rebidding 2♠, this treatment, as with so many in bridge, requires partnership discussion and agreement.
        answer: 2s
        accept: [1s]

