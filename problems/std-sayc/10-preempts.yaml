  #10
  - hand: saj107653 hqj10 d10 cj4
    dealer: n
    auction:
      - n: p
      - s: "?"
        explain: |
          On the plus side, you have a long suit with good texture. On the minus side is the Q J 10 of hearts, good support for a possible heart contract, the defensive ♠A and a reasonable hand for a possible notrump contract. In first or second seat, one can easily argue that there are too many minuses for a 3♠ opening. We recommend that you pass. If partner cannot open the bidding, you can introduce your spades at your next turn. Holding the ‘boss’ suit, you are not likely to be out of this auction. In third seat, bid 3♠.
        answer: 3s

