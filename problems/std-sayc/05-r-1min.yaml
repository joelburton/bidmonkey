quiz: SAYC Responding to 1m
problems:

#1
- hand: sa954 hkj5 d652 c1064
  dealer: n
  auction:
  - n: 1c
  - s: "?"
    explain: |
      Do not ‘show your count’ by bidding 1NT. Show your four-card major by bidding 1♠. Playing five-card majors, partner may well have a four-card spade suit that could not be opened. As with the major-suit auctions, the new suit is forcing and does not limit your hand.
    answer: 1s

#2
- hand: sa97 h1086 dk72 c9532
  dealer: n
  auction:
  - n: 1c
  - s: "?"
    explain: |
      Holding 6-10 HCP and no four-card major, bid 1NT. You have now limited your hand to a maximum of 10 HCP. As partner can easily hold a three-card club suit, do not raise to 2♣. Your 1NT bid does not promise stoppers in the unbid suits; rather, you are showing your HCP range and denying a four-card major. The 1NT response to 1♣ often shows a 3-3-3-4 pattern. It denies a major, and with four diamonds you could respond 1♦ rather than take the notrump contract away from the stronger hand.
    answer: 1nt

