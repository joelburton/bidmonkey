#4
- hand: sk975 h108 dkj76 c863
  dealer: n
  auction:
  - n: 1c
  - s: "?"
    explain: |
      With this hand, you would respond 1♦. There are, however, two schools of thought here. SAYC stipulates that responder bid up the line, including diamonds before hearts even when holding 6 HCP. However, many SAYC players today, ourselves included, feel that because bidding has become increasingly aggressive, it is vital to get the major suits into the auction as quickly as possible. Such players would hardly give the diamond suit a glance before responding 1♠. On the other hand, there are advanced SAYC players who will bid 1♦ as it allows the stronger hand to be declarer if a major-suit fit is found (1♣-1♦; 1♠-2♠ versus 1♣-1♠; 2♠) while still permitting the partnership to locate a spade (or heart) fit after a 1♦ response. This approach also enables you to find a diamond fit when opener has five or six clubs and four diamonds, but is too weak to reverse.
    answer: 1d
    accept: [1s]


#5
- hand: sk1095 h84 dkj752 c98
  dealer: n
  auction:
  - n: 1c
  - s: "?"
    explain: |
      Similarly, many would bypass even this diamond suit in favor of a 1♠ bid in spite of the fact that this is not standard SAYC. One advantage of this treatment is that if LHO has a heart suit, it will have to be introduced at the two-level. The diamond lovers, however, will not bypass this suit and will again argue that if partner can’t bid a major suit over 1♦, then nothing is lost! Did we say argue? Argue about bridge? Perish the thought!
    answer: 1d
    accept: [1s]



