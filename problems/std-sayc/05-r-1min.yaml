#8
- hand: sa42 hk108 dj753 cqj5
  dealer: n
  auction:
  - n: 1d
  - s: "?"
    explain: |
      This is a difficult hand to bid using standard methods. A 3♦ limit raise can be based on four diamonds, but it is best to have five or more. Given the fact that the hand is flat, the best solution may be to deduct one point for lack of shape and bid 1NT. The 1NT response to an opening bid of 1♣ or 1♦ denies a four-card major suit and shows 6-10 HCP.
    answer: 1nt
    accept: [3d]

