  #16
  - hand: sa h4 dakq108 caq10987
    dealer: e
    auction:
      - e: 1s
      - s: "?"
        explain: |
          If RHO opens either 1♥ or 1♠, bid 4NT. This highly unusual jump tells partner to pick the minor-suit game. In the unlikely event that he can provide a trick, he will pick the minor-suit slam instead.
        answer: 4nt
        accept: [2nt]


