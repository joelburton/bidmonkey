name: Supabase keep-alive

# Free Supabase projects pause after ~7 days without API activity. This makes one
# small PostgREST request a day so bidmonkey's project stays awake between visits.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       e.g. https://<ref>.supabase.co
#   SUPABASE_ANON_KEY  the public anon key
# (GitHub disables scheduled workflows after 60 days of repo inactivity — a push
# re-enables them.)

on:
  schedule:
    - cron: '17 9 * * *' # daily ~09:17 UTC (off the hour, per GitHub guidance)
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PostgREST
        run: |
          curl -fsS \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/sources?select=slug&limit=1" \
            -o /dev/null -w 'HTTP %{http_code}\n'
